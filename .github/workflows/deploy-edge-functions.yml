name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:
    inputs:
      function:
        description: 'Specific function slug to deploy (leave blank for all)'
        required: false
        type: string

concurrency:
  group: supabase-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Guard against missing secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be configured as repository secrets"
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine functions to deploy
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.function }}" ]; then
            echo "functions=${{ github.event.inputs.function }}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying single function: ${{ github.event.inputs.function }}"
            exit 0
          fi

          # On push, deploy only the functions whose files changed in this push.
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          # First push on a branch can have BASE_SHA=0000…; fall back to deploying everything in that case.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA available — deploying all functions"
            FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -not -name '_shared' -printf '%f\n' | sort -u | paste -sd, -)
          else
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'supabase/functions/' || true)
            if echo "$CHANGED" | grep -q '^supabase/functions/_shared/'; then
              echo "_shared changed — deploying all functions"
              FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -not -name '_shared' -printf '%f\n' | sort -u | paste -sd, -)
            else
              FUNCTIONS=$(echo "$CHANGED" \
                | awk -F/ '/^supabase\/functions\// && $3 != "" && $3 != "_shared" {print $3}' \
                | sort -u \
                | paste -sd, -)
            fi
          fi

          echo "functions=$FUNCTIONS" >> "$GITHUB_OUTPUT"
          echo "Will deploy: ${FUNCTIONS:-<none>}"

      - name: Deploy
        if: steps.changed.outputs.functions != ''
        run: |
          IFS=',' read -ra FNS <<< "${{ steps.changed.outputs.functions }}"
          FAILED=()
          for fn in "${FNS[@]}"; do
            [ -z "$fn" ] && continue
            echo "::group::Deploy $fn"
            if ! supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"; then
              echo "::warning::First attempt to deploy $fn failed — retrying once after 5s"
              sleep 5
              if ! supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"; then
                echo "::error::Failed to deploy $fn (after retry)"
                FAILED+=("$fn")
              fi
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Deployment failed for: ${FAILED[*]}"
            exit 1
          fi
