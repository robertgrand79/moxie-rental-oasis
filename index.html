  <head>

    <title>StayMoxie</title>
    <meta name="description" content="Discover vacation rentals.">
    <meta name="keywords" content="">

    <!-- Canonical URL -->
    <link rel="canonical" href="">

    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://joiovubyokikqjytxtuv.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="//supabase.co">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600;700&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;500;600;700&display=swap">
    </noscript>
    
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3B82F6">
    
    <!-- Favicon - will be overridden by tenant settings -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />

    <!-- Twitter Card Tags -->

    <meta name="twitter:description" content="Discover vacation rentals.">
    <meta name="twitter:image" content="" />
  </head>

  </body>
</html>
